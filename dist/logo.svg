<svg width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Cart body -->
  <rect x="10" y="15" width="25" height="15" rx="2" fill="url(#cartGrad)" />
  <!-- Handle -->
  <path d="M35 15 Q40 10 40 15" stroke="url(#cartGrad)" stroke-width="3" fill="none" />
  <!-- Wheels -->
  <circle cx="15" cy="35" r="4" fill="#333" />
  <circle cx="30" cy="35" r="4" fill="#333" />
  <!-- Cart lines -->
  <line x1="12" y1="20" x2="32" y2="20" stroke="#fff" stroke-width="1" />
  <line x1="12" y1="25" x2="32" y2="25" stroke="#fff" stroke-width="1" />
</svg>