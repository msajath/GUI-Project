<svg width="720" height="240" viewBox="0 0 720 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ShopSphere Logo</title>
  <desc id="desc">ShopSphere wordmark with globe shopping icon and tagline.</desc>
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#144a94"/>
      <stop offset="100%" stop-color="#2ea7c6"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7b733"/>
      <stop offset="100%" stop-color="#f37735"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g transform="translate(28,18)">
    <circle cx="92" cy="72" r="64" fill="none" stroke="url(#blueGrad)" stroke-width="10"/>
    <path d="M30 72h124M92 10v124M46 34c20 15 72 15 92 0M46 110c20-15 72-15 92 0" fill="none" stroke="#2d8eb4" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="92" cy="72" rx="92" ry="28" fill="none" stroke="url(#blueGrad)" stroke-width="10" transform="rotate(-18 92 72)"/>
    <path d="M26 85c34 32 98 34 136 2" fill="none" stroke="url(#orangeGrad)" stroke-width="10" stroke-linecap="round"/>

    <g transform="translate(62,90) rotate(-8)">
      <rect x="0" y="0" width="66" height="34" rx="5" fill="none" stroke="url(#blueGrad)" stroke-width="6"/>
      <path d="M6 -10h10l7 10" fill="none" stroke="url(#blueGrad)" stroke-width="6" stroke-linecap="round"/>
      <circle cx="14" cy="42" r="6" fill="none" stroke="url(#blueGrad)" stroke-width="5"/>
      <circle cx="50" cy="42" r="6" fill="none" stroke="url(#blueGrad)" stroke-width="5"/>
      <path d="M16 16h36" stroke="#f37735" stroke-width="5" stroke-linecap="round"/>
    </g>

    <g transform="translate(64,14)">
      <path d="M0 22V8a14 14 0 0 1 28 0v14" fill="none" stroke="url(#blueGrad)" stroke-width="6" stroke-linecap="round"/>
      <rect x="-6" y="20" width="40" height="32" rx="6" fill="none" stroke="url(#blueGrad)" stroke-width="6"/>
    </g>

    <polygon points="97,48 101,57 111,57 103,63 106,72 97,67 88,72 91,63 83,57 93,57" fill="#f29b2f"/>
    <polygon points="129,112 132,118 139,118 133,123 135,130 129,126 123,130 125,123 119,118 126,118" fill="#f29b2f"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(250,134)">
    <text x="0" y="0" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="800" fill="#144a94">SHOP</text>
    <text x="205" y="0" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="700" fill="#2e9ebd">Sphere</text>
    <text x="0" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="28" letter-spacing="2" fill="#1f4e7b">YOUR WORLD OF ONLINE SHOPPING</text>
  </g>
</svg>
